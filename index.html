let cart=[];


function renderFilters(){
 const f=document.getElementById('filters');
 const all=["Todos",...categories];
 f.innerHTML=all.map(c=>`<button class="btn filter-btn ${c===activeCategory?'active':''}" onclick="setCategory('${c}')">${c}</button>`).join('');
}

function setCategory(cat){
 activeCategory=cat;
 renderFilters();
 renderProducts();
}

function productCard(p){
 return `<div class='card'>
<img src='${p.img}'>
<h3>${p.name}</h3>
<p><strong>${p.categoria}</strong></p>
<p>$${p.price.toFixed(2)}</p>
<p>Stock: ${p.stock}</p>
<button class='btn' onclick='addCart(${p.id})'>Agregar al carrito</button>
</div>`;
}

function renderProducts(){
 const container=document.getElementById('products');

 if(activeCategory==="Todos"){
   container.innerHTML=categories.map(cat=>{
      const items=products.filter(p=>p.categoria===cat);
      return `<h2 class="category-title">${cat.toUpperCase()}</h2>
      <div class="grid">${items.map(productCard).join('')}</div>`;
   }).join('');
 } else {
   const items=products.filter(p=>p.categoria===activeCategory);
   container.innerHTML=`<h2 class="category-title">${activeCategory.toUpperCase()}</h2>
   <div class="grid">${items.map(productCard).join('')}</div>`;
 }
}

function toggleCart(){document.getElementById('drawer').classList.toggle('open');}

function addCart(id){
const p=products.find(x=>x.id===id);
let item=cart.find(x=>x.id===id);
if(item){if(item.qty>=p.stock){alert('Stock máximo disponible alcanzado.');return;} item.qty++;}
else{cart.push({...p,qty:1});}
renderCart();
}

function renderCart(){
const container=document.getElementById('cartContainer');
let total=0,totalItems=0;
if(cart.length===0){container.innerHTML="<p>No hay productos agregados.</p>";}
else{
container.innerHTML=cart.map(item=>{
const subtotal=item.qty*item.price;
total+=subtotal; totalItems+=item.qty;
return `<div style="border-bottom:1px solid #ddd;padding:8px 0">
<b>${item.name}</b><br>
Cantidad: ${item.qty}<br>
Precio unitario: $${item.price.toFixed(2)}<br>
Subtotal: $${subtotal.toFixed(2)}<br>
<div class="row"><button onclick="changeQty(${item.id},-1)">-</button><button onclick="changeQty(${item.id},1)">+</button><button onclick="removeItem(${item.id})">🗑</button></div></div>`;
}).join('');
}
document.getElementById('badge').textContent=totalItems;
document.getElementById('total').textContent='Total a pagar: $'+total.toFixed(2);
}

function changeQty(id,d){
const p=products.find(x=>x.id===id), item=cart.find(x=>x.id===id);
if(!item)return;
if(item.qty+d>p.stock){alert('Stock máximo disponible alcanzado.');return;}
item.qty+=d;
if(item.qty<=0) cart=cart.filter(x=>x.id!==id);
renderCart();
}
function removeItem(id){cart=cart.filter(x=>x.id!==id);renderCart();}

function sendOrder(){
const n=buyerName.value.trim(), c=buyerCed.value.trim();
if(!n||!c){alert('Complete nombre y cédula');return;}
if(cart.length===0){alert('Carrito vacío');return;}
let total=cart.reduce((a,b)=>a+b.qty*b.price,0);
let m=`Hospital Saludesa - Pedido Interno\n\nNombre: ${n}\nCédula: ${c}\n\nProductos:\n`;
cart.forEach(i=>m+=`${i.name} x ${i.qty}\n`);
m+=`\nTotal: $${total.toFixed(2)}`;
window.open('https://wa.me/593958759765?text='+encodeURIComponent(m),'_blank');
}

function sendRequest(){
